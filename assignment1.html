<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="utf-8">
    <script src="https://kit.fontawesome.com/d5d03442d7.js" crossorigin="anonymous"></script>

<style>
    video {
        width: 100%;
        height: 100%;
        overflow: hidden;
    }


    h1 {
        position: absolute;
        top: 30%;
        left: 20%;
        z-index: 1;
        color: white;
        font-family:Arial, Helvetica, sans-serif;
        font-size: 300%;
    }

    p {
        position: absolute;
        top: 40%;
        left: 20%;
        z-index: 1;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
    }

    ul {
        color: white;
        list-style: none;
        position: absolute;
        top: 10%;
        left: 85%;
        font-size: 120%;
        z-index: 1;
    
    }
</style>
</head>
<body>
    <div id="outer">
        <div id="background">
            <video autoplay loop muted>
                <source src="background.mp4" type="video/mp4">
            </video>
            <div id="overlay">
                <h1>Marcus Kurciviez</h1>
                <p>Welcome to My Page!</p>
                <ul>
                    <li> <i class="fas fa-male"></i> About Me</li>
                    <li> <i class="fas fa-clipboard"></i> Resume</li>
                    <li> <i class="fas fa-code"></i> Portfolio</li>
                    <li> <i class="fab fa-black-tie"></i> Work</li>
                </ul>
            </div>
        </div>
    </div>
   

</body>

</html>
